<!-- work view -->
<div class="work-view" style="visibility: hidden;">
  <div class="work-view-header">
    <span id="view.title" class="wkv-header-item">System Infos</span>
    <span class="wkv-header-item-right wkv-header-close-ctrl"><i class="bi bi-x-lg"
        onclick="WbApp.onViewClose(event)" title="Close View"></i></span>
  </div>
  <div class="work-view-body">
    <!--this elements are set by the app-->
    <plb>Name:</plb>
    <pval id="server.name"></pval></br>
    <plb>Version:</plb>
    <pval id="server.version"></pval></br>
    <plb>Description:</plb>
    <pval id="server.description"></pval></br>
  </div>
</div>
<!-- work view end -->
