<!DOCTYPE html>
<html>

<body style="font-family: sans-serif">
	<h3>Basic JavaScript Fetch Sample</h3>
	<p id="request"></p>
	<p id="response"></p>
	<script>
		//CHANGE to YOUR PORT here
		const url = "http://localhost:8099/api/about";

		let request = `NO arguments - URL: <a href=${url}>${url}</a>`;

		async function getIPCData() {
			let data = "";

			try {
				const response = await fetch(url, {
					method: "POST",
					accept: "application/json",
					headers: {"Content-Type": "application/json"},
					mode: "cors", // required for localhost communication via js fetch
					body: request
				})

				if (!response.ok) {
					throw new Error(`Response status: ${response.status}`);
				}

				data = await response.text();

			} catch (error) {
				data = error.message;
			}
			return data;
		}

		function processIPCData(data) {
			console.log(typeof data + "[" + data + "]");
			document.getElementById("request").innerHTML = "Request:<br/> "+request;
			document.getElementById("response").innerHTML = "Response:<br/> "+data;
		}

		for (let i = 0; i < 1; i++) {
			getIPCData().then((data) => processIPCData(data));
		}

	</script>
</body>

</html>
