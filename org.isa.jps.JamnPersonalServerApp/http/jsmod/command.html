<!-- work view -->
<div class="work-view" style="visibility: hidden;">
	<div class="work-view-header">

		<span class="wkv-header-item-left wkv-header-item-menu"><i id="menu.icon"
				class="bi bi-three-dots-vertical wkv-header-menu-ctrl"
				onclick="WbApp.onViewAction(event, 'header.menu')" title="Menu"></i>
		</span>

		<span id="header.menu" class="wkv-header-item-left wkv-header-menu-container">
			<div class="wkv-header-menu">
			</div>
		</span>

		<span id="view.title" class="wkv-header-item">Unknown</span>

		<span class="wkv-header-item-right"><i id="pin.icon" class="bi bi-pin wkv-header-action-ctrl"
				onclick="WbApp.onViewAction(event, 'pin')" title="Pin to keep view"></i></span>
		<span class="wkv-header-item-right"><i id="collapse.icon"
				class="bi bi-chevron-bar-contract wkv-header-action-ctrl"
				onclick="WbApp.onViewAction(event, 'collapse')" title="Collapse view"></i></span>
		<span class="wkv-header-item-right"><i id="close.icon" class="bi bi-x-lg wkv-header-action-ctrl"
				onclick="WbApp.onViewAction(event, 'close')" title="Close View"></i></span>
	</div>
	<div id="work.view.workarea" class="work-view-body">
		<plb style="width: 70px;">Command:</plb>
		<button id="pb.run" class="cmd-button" title="Run Command"></button>
		<img id="run.indicator" src="images/working-indicator-small.gif"
			style="vertical-align:middle; visibility: hidden;"></br>
		<plb style="width: 70px;">Args:</plb>
		<input type="text" id="cmd.args" style="width: 400px;"><br>
		<div style="display: flex; align-items: top;">
			<plb style="min-width: 70px;">Output:</plb>
			<textarea id="cmd.output" class="output-textarea" style="width: 100%; height: 400px; margin-left: 3px;"
				readonly></textarea>
		</div>
	</div>
</div>
<!-- work view end -->
