<!-- work view -->
<div class="work-view" style="visibility: hidden;">
	<div class="work-view-header">
	  <span id="view.title" class="wkv-header-item">Unknown</span>
	<span class="wkv-header-item-right wkv-header-action-ctrl"><i id="pin.icon" class="bi bi-pin"
	    onclick="WbApp.onViewAction(event, 'pin')" title="Pin to keep view"></i></span>
	<span class="wkv-header-item-right wkv-header-action-ctrl"><i id="collapse.icon" class="bi bi-chevron-bar-contract"
	    onclick="WbApp.onViewAction(event, 'collapse')" title="Collapse view"></i></span>
	  <span class="wkv-header-item-right wkv-header-action-ctrl"><i id="close.icon" class="bi bi-x-lg"
	      onclick="WbApp.onViewAction(event, 'close')" title="Close View"></i></span>
	</div>
  <div id="work.view.workarea" class="work-view-body">
    <!--this elements are set by the app-->
    <plb>Name:</plb>
    <pval id="server.name"></pval></br>
    <plb>Version:</plb>
    <pval id="server.version"></pval></br>
    <plb>Description:</plb>
    <pval id="server.description"></pval></br>
  </div>
</div>
<!-- work view end -->
