<!--jamn.web.template-->

<!DOCTYPE html>
<html lang=en>

<head>
	<meta charset="UTF-8">
	<title>${index.title}</title>
	<link rel="stylesheet" href="css/app.css" type="text/css" />

	<!--
		Sample classic JavaScript import
	-->
	<script type="text/javascript" src="js/app-util.js"></script>

	<script>
		//check if ECMA JS Module importmap is supported
		if (!HTMLScriptElement.supports?.("importmap")) {
			console.log("WARNING - Browser DOES NOT SUPPORT ECMA JS Module importmap.");
		} 
	</script>
	<!--
		Sample ECMA JS Module import
	-->
	<script type="importmap">
	{
	    "imports": {
	        "app-util": "/jsmod/app-util.mjs"
	    }
	}
	</script>

</head>

<body>
	<div class="info-block">
		<img src="images/app-logo.png" title="App Logo" alt="app-logo" width="64px" height="64px" />
		<p id=server-info>JamnServer Info</p>
			<script type="module">
				import * as util from 'app-util';

				//call classic js function
				jamnLog(util.JamnServerInfo);

				//use ECMA Module
				let infoHtml = util.JamnServerInfo.name + "<span style='font-size: 0.5em;'> V-" + util.JamnServerInfo.version + "</span><br>" + util.JamnServerInfo.description;
				util.setElementHTML("server-info", infoHtml);

			</script>
	</div>
</body>

</html>
